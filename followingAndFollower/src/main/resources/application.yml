spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/TWEET_FOLLOWING_AND_FOLLOWER
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  application:
    name: following-and-follower
  cloud:
    consul:
      enabled: false    # Keep false if Consul is not running
      discovery:
        enabled: false

server:
  port: 8082

# Resilience4j Circuit Breaker Config
resilience4j:
  circuitbreaker:
    instances:
      player-service:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        automatic-transition-from-open-to-half-open-enabled: true
